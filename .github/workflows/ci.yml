name: CI/CD Proyecto Semestral DevOps

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:

    - name: Clonar repositorio
      uses: actions/checkout@v4

    - name: Configurar Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '21'

    - name: Configurar Node
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Compilar Backend Ventas
      working-directory: back-Ventas_SpringBoot/Springboot-API-REST
      run: mvn clean package -DskipTests

    - name: Compilar Backend Despachos
      working-directory: back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
      run: mvn clean package -DskipTests

    - name: Instalar Frontend
      working-directory: front_despacho
      run: npm install

    - name: Compilar Frontend
      working-directory: front_despacho
      run: npm run build

    - name: Login Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Build Backend Ventas
      uses: docker/build-push-action@v6
      with:
        context: ./back-Ventas_SpringBoot/Springboot-API-REST
        push: true
        tags: cris200304/backend-ventas:latest

    - name: Build Backend Despachos
      uses: docker/build-push-action@v6
      with:
        context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
        push: true
        tags: cris200304/backend-despachos:latest

    - name: Build Frontend
      uses: docker/build-push-action@v6
      with:
        context: ./front_despacho
        push: true
        tags: cris200304/frontend-despacho:latest